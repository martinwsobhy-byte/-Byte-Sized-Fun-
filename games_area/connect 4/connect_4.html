<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect 4</title>
    <link rel="stylesheet" href="connect_4.css">
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <h1>🔴🟡 Connect 4</h1>
            <div class="game-mode">
                <span id="gameMode">vs AI</span>
            </div>
        </div>

        <div class="game-content">
            <!-- Game Board -->
            <div class="board-container">
                <div class="board" id="gameBoard">
                    <!-- Columns will be generated by JavaScript -->
                </div>
            </div>

            <!-- Game Controls -->
            <div class="controls-container">
                <div class="player-info">
                    <div class="player player1" id="player1Info">
                        <div class="player-disc red-disc"></div>
                        <div class="player-details">
                            <h3>Player 1</h3>
                            <p>Red</p>
                        </div>
                        <div class="player-turn" id="player1Turn">Your Turn!</div>
                    </div>

                    <div class="player player2" id="player2Info">
                        <div class="player-disc yellow-disc"></div>
                        <div class="player-details">
                            <h3 id="player2Name">AI</h3>
                            <p>Yellow</p>
                        </div>
                        <div class="player-turn" id="player2Turn"></div>
                    </div>
                </div>

                <div class="game-stats">
                    <h3>Game Stats</h3>
                    <p>Moves: <span id="totalMoves">0</span></p>
                    <p>Player 1 Wins: <span id="player1Wins">0</span></p>
                    <p>Player 2 Wins: <span id="player2Wins">0</span></p>
                </div>

                <div class="game-buttons">
                    <button class="game-btn restart-btn" onclick="restartGame()">🔄 New Game</button>
                    <button class="game-btn menu-btn" onclick="changeMode()">🎮 Change Mode</button>
                    <button class="game-btn back-btn" onclick="goBack()">🏠 Main Menu</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Winner Modal -->
    <div id="winnerModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="winnerTitle">🏆 Winner!</h2>
            </div>
            <div class="modal-body">
                <div class="winner-animation">🎉</div>
                <div class="winner-disc" id="winnerDisc"></div>
                <h3 id="winnerName">Player 1</h3>
                <p id="winnerMessage">Congratulations! You won!</p>
                <div class="winner-stats">
                    <p>Total Moves: <span id="winnerMoves">0</span></p>
                </div>
            </div>
            <div class="modal-footer">
                <button class="modal-btn play-again-btn" onclick="restartGame()">Play Again</button>
                <button class="modal-btn menu-btn" onclick="goBack()">Main Menu</button>
            </div>
        </div>
    </div>

    <script src="connect_4.js"></script>
</body>
</html>
