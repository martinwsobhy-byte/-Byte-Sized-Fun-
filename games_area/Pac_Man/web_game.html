<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pac-Man Web Game</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }
        
        .game-wrapper {
            text-align: center;
            background: rgba(0, 0, 0, 0.9);
            padding: 20px;
            border-radius: 15px;
            border: 3px solid #ffff00;
        }
        
        .game-info {
            color: white;
            margin-bottom: 20px;
            font-size: 18px;
        }
        
        .game-info span {
            margin: 0 20px;
            font-weight: bold;
        }
        
        #gameCanvas {
            border: 2px solid #ffff00;
            background: #000;
            display: block;
            margin: 0 auto;
        }
        
        .game-controls {
            margin-top: 20px;
            color: white;
        }
        
        .control-btn {
            padding: 10px 20px;
            margin: 5px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .control-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(5, 41, 201, 0.4);
        }
        
        .instructions {
            color: #ccc;
            margin-top: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <div class="game-info">
            <span>Score: <span id="score">0</span></span>
            <span>Lives: <span id="lives">3</span></span>
            <span>Level: <span id="level">1</span></span>
        </div>
        
        <canvas id="gameCanvas" width="600" height="600"></canvas>
        
        <div class="game-controls">
            <button class="control-btn" onclick="pauseGame()">⏸️ Pause</button>
            <button class="control-btn" onclick="restartGame()">🔄 Restart</button>
            <button class="control-btn" onclick="backToLauncher()">🏠 Back</button>
        </div>
        
        <div class="instructions">
            <p>Use <strong>WASD</strong> or <strong>Arrow Keys</strong> to move Pac-Man</p>
            <p>Collect all dots while avoiding ghosts!</p>
        </div>
    </div>

    <!-- Game Over Screen -->
    <div id="gameOverScreen" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000;">
        <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%); padding: 40px; border-radius: 20px; text-align: center; color: white; border: 3px solid #ffff00;">
            <h2 style="color: #ff4444; margin-bottom: 20px;">Game Over!</h2>
            <p>Final Score: <span id="finalScore">0</span></p>
            <p>Level Reached: <span id="finalLevel">1</span></p>
            <div style="margin-top: 30px;">
                <button onclick="restartGame()" style="padding: 15px 30px; margin: 10px; background: linear-gradient(135deg, #ffff00 0%, #ffa500 100%); color: #000; border: none; border-radius: 10px; cursor: pointer; font-weight: bold;">Play Again</button>
                <button onclick="backToLauncher()" style="padding: 15px 30px; margin: 10px; background: #666; color: white; border: none; border-radius: 10px; cursor: pointer;">Back to Launcher</button>
            </div>
        </div>
    </div>
    
    <!-- Victory Screen -->
    <div id="victoryScreen" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000;">
        <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%); padding: 40px; border-radius: 20px; text-align: center; color: white; border: 3px solid #ffff00;">
            <h2 style="color: #44ff44; margin-bottom: 20px;">Level Complete!</h2>
            <p>Score: <span id="levelScore">0</span></p>
            <div style="margin-top: 30px;">
                <button onclick="nextLevel()" style="padding: 15px 30px; margin: 10px; background: linear-gradient(135deg, #44ff44 0%, #28a745 100%); color: #000; border: none; border-radius: 10px; cursor: pointer; font-weight: bold;">Next Level</button>
                <button onclick="backToLauncher()" style="padding: 15px 30px; margin: 10px; background: #666; color: white; border: none; border-radius: 10px; cursor: pointer;">Back to Launcher</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Initialize the web game when page loads
        window.onload = function() {
            if (typeof initGame === 'function') {
                initGame();
            } else {
                console.error('Game initialization function not found');
            }
        };
        
        function pauseGame() {
            if (typeof gameRunning !== 'undefined') {
                gameRunning = !gameRunning;
                const btn = event.target;
                btn.textContent = gameRunning ? '⏸️ Pause' : '▶️ Resume';
            }
        }
        
        function backToLauncher() {
            window.location.href = 'Pac_Man.html';
        }
        
        // Add keyboard event listeners
        document.addEventListener('keydown', function(e) {
            // Prevent default scrolling behavior
            if(['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'w', 'a', 's', 'd'].includes(e.key)) {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
