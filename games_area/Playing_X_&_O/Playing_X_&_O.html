<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X and O Game</title>
    <link rel="stylesheet" href="Playing_X_&_O.css">
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>🎮 X and O Game</h1>
            <div class="game-info">
                <div class="info-item">
                    <span class="label">Mode:</span>
                    <span id="gameMode">vs AI</span>
                </div>
                <div class="info-item">
                    <span class="label">Current Player:</span>
                    <span id="currentPlayer">X</span>
                </div>
                <div class="info-item">
                    <span class="label">Score:</span>
                    <span id="score">X: 0 | O: 0</span>
                </div>
            </div>
        </div>

        <div class="game-board-container">
            <div class="game-board" id="gameBoard">
                <div class="cell" data-index="0"></div>
                <div class="cell" data-index="1"></div>
                <div class="cell" data-index="2"></div>
                <div class="cell" data-index="3"></div>
                <div class="cell" data-index="4"></div>
                <div class="cell" data-index="5"></div>
                <div class="cell" data-index="6"></div>
                <div class="cell" data-index="7"></div>
                <div class="cell" data-index="8"></div>
            </div>
        </div>

        <div class="game-status">
            <div id="statusMessage">Player X's turn</div>
            <div id="aiThinking" class="ai-thinking" style="display: none;">
                🤖 AI is thinking...
                <div class="thinking-dots">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </div>

        <div class="game-controls">
            <button class="control-btn" onclick="resetGame()">🔄 New Game</button>
            <button class="control-btn" onclick="changeMode()">⚙️ Change Mode</button>
            <button class="control-btn" onclick="goBack()">🏠 Back to Games</button>
        </div>

        <!-- Win/Tie Modal -->
        <div id="gameModal" class="modal" style="display: none;">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="modalTitle">Game Over</h2>
                </div>
                <div class="modal-body">
                    <div id="modalMessage">Player X wins!</div>
                    <div class="modal-stats">
                        <div class="stat">
                            <span class="stat-label">Games Played:</span>
                            <span id="gamesPlayed">1</span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">X Wins:</span>
                            <span id="xWins">0</span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">O Wins:</span>
                            <span id="oWins">0</span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">Ties:</span>
                            <span id="ties">0</span>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="modal-btn primary" onclick="playAgain()">🎮 Play Again</button>
                    <button class="modal-btn secondary" onclick="changeMode()">⚙️ Change Mode</button>
                    <button class="modal-btn secondary" onclick="goBack()">🏠 Back to Games</button>
                </div>
            </div>
        </div>
    </div>

    <script src="Playing_X_&_O.js"></script>
</body>
</html>
