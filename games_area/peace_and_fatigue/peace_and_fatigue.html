<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snakes and Ladders</title>
    <link rel="stylesheet" href="peace_and_fatigue.css">
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <h1>🎲 Snakes and Ladders 🐍</h1>
            <div class="game-mode">
                <span id="gameMode">vs AI</span>
            </div>
        </div>

        <div class="game-content">
            <!-- Game Board -->
            <div class="board-container">
                <canvas id="gameBoard" width="600" height="600"></canvas>
            </div>

            <!-- Game Controls -->
            <div class="controls-container">
                <div class="player-info">
                    <div class="player player1" id="player1Info">
                        <div class="player-avatar">🔴</div>
                        <div class="player-details">
                            <h3>Player 1</h3>
                            <p>Position: <span id="player1Pos">1</span></p>
                        </div>
                        <div class="player-turn" id="player1Turn">Your Turn!</div>
                    </div>

                    <div class="player player2" id="player2Info">
                        <div class="player-avatar">🔵</div>
                        <div class="player-details">
                            <h3 id="player2Name">AI</h3>
                            <p>Position: <span id="player2Pos">1</span></p>
                        </div>
                        <div class="player-turn" id="player2Turn"></div>
                    </div>
                </div>

                <div class="dice-container">
                    <div class="dice" id="dice">
                        <div class="dice-face">?</div>
                    </div>
                    <button class="roll-btn" id="rollBtn" onclick="rollDice()">🎲 Roll Dice</button>
                </div>

                <div class="game-stats">
                    <h3>Game Stats</h3>
                    <p>Rolls: <span id="totalRolls">0</span></p>
                    <p>Ladders Climbed: <span id="laddersClimbed">0</span></p>
                    <p>Snakes Hit: <span id="snakesHit">0</span></p>
                </div>

                <div class="game-buttons">
                    <button class="game-btn restart-btn" onclick="restartGame()">🔄 Restart</button>
                    <button class="game-btn menu-btn" onclick="changeMode()">🎮 Change Mode</button>
                    <button class="game-btn back-btn" onclick="goBack()">🏠 Main Menu</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Winner Modal -->
    <div id="winnerModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="winnerTitle">🏆 Winner!</h2>
            </div>
            <div class="modal-body">
                <div class="winner-animation">🎉</div>
                <h3 id="winnerName">Player 1</h3>
                <p id="winnerMessage">Congratulations! You won!</p>
                <div class="winner-stats">
                    <p>Total Rolls: <span id="winnerRolls">0</span></p>
                    <p>Ladders Climbed: <span id="winnerLadders">0</span></p>
                    <p>Snakes Hit: <span id="winnerSnakes">0</span></p>
                </div>
            </div>
            <div class="modal-footer">
                <button class="modal-btn play-again-btn" onclick="restartGame()">Play Again</button>
                <button class="modal-btn menu-btn" onclick="goBack()">Main Menu</button>
            </div>
        </div>
    </div>

    <script src="peace_and_fatigue.js"></script>
</body>
</html>
