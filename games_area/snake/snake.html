<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <link rel="stylesheet" href="snake.css">
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <h1>🐍 Snake Game</h1>
            <div class="game-info">
                <div class="info-item">
                    <span class="info-label">Score:</span>
                    <span class="info-value" id="score">0</span>
                </div>
                <div class="info-item">
                    <span class="info-label">High Score:</span>
                    <span class="info-value" id="highScore">0</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Speed:</span>
                    <span class="info-value" id="speed">1</span>
                </div>
            </div>
        </div>

        <div class="game-content">
            <canvas id="gameCanvas" width="600" height="600"></canvas>
            
            <div class="game-controls">
                <div class="controls-section">
                    <h3>🎮 Controls</h3>
                    <div class="control-keys">
                        <div class="key-row">
                            <button class="arrow-key" onclick="changeDirection('up')">↑</button>
                        </div>
                        <div class="key-row">
                            <button class="arrow-key" onclick="changeDirection('left')">←</button>
                            <button class="arrow-key" onclick="changeDirection('down')">↓</button>
                            <button class="arrow-key" onclick="changeDirection('right')">→</button>
                        </div>
                    </div>
                    <p class="control-hint">Use Arrow Keys or WASD</p>
                </div>

                <div class="game-stats">
                    <h3>📊 Stats</h3>
                    <div class="stat-item">
                        <span>Length:</span>
                        <span id="length">1</span>
                    </div>
                    <div class="stat-item">
                        <span>Food Eaten:</span>
                        <span id="foodEaten">0</span>
                    </div>
                    <div class="stat-item">
                        <span>Time:</span>
                        <span id="time">0:00</span>
                    </div>
                </div>

                <div class="game-buttons">
                    <button class="game-btn pause-btn" onclick="togglePause()">⏸️ Pause</button>
                    <button class="game-btn restart-btn" onclick="restartGame()">🔄 Restart</button>
                    <button class="game-btn customize-btn" onclick="goToCustomize()">🎨 Customize</button>
                    <button class="game-btn menu-btn" onclick="goToMenu()">🏠 Menu</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Game Over Modal -->
    <div id="gameOverModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>💀 Game Over!</h2>
            </div>
            <div class="modal-body">
                <div class="game-over-icon">🐍</div>
                <h3 id="gameOverMessage">You bit yourself!</h3>
                <div class="final-stats">
                    <div class="final-stat">
                        <span class="stat-label">Final Score:</span>
                        <span class="stat-value" id="finalScore">0</span>
                    </div>
                    <div class="final-stat">
                        <span class="stat-label">Length:</span>
                        <span class="stat-value" id="finalLength">0</span>
                    </div>
                    <div class="final-stat">
                        <span class="stat-label">Time:</span>
                        <span class="stat-value" id="finalTime">0:00</span>
                    </div>
                    <div class="final-stat highlight" id="newHighScore" style="display: none;">
                        <span class="stat-label">🏆 New High Score!</span>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="modal-btn play-again-btn" onclick="restartGame()">🔄 Play Again</button>
                <button class="modal-btn menu-btn" onclick="goToMenu()">🏠 Main Menu</button>
            </div>
        </div>
    </div>

    <!-- Pause Overlay -->
    <div id="pauseOverlay" class="pause-overlay" style="display: none;">
        <div class="pause-content">
            <h2>⏸️ PAUSED</h2>
            <p>Press SPACE or click Pause to continue</p>
        </div>
    </div>

    <script src="snake.js"></script>
</body>
</html>
