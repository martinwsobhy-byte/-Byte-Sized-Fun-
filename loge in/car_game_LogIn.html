<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login </title>
    <link rel="stylesheet" href="car_game_LogIn.css">
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <div class="logo">
                <span class="logo-text">
                    <span class="fun">Fun</span><span class="icon">🎮</span><span class="byte">Byte-Sized</span>
                </span>
                <div class="logo-subtitle">Classic Games Program</div>
            </div>
        </div>
        
        <div class="form-box">
            <h1>Login</h1>
            <form id="loginForm">
                <div class="input-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" required placeholder="Enter phone number">
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Enter password">
                </div>
                <button type="submit" class="btn-submit">Login</button>

                <p class="signup-link">Don't have an account? 
                    <a href="creat acent/car_game_creat.html">Create a new account</a>
                </p>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;

            // Get saved users from local storage
            let users = JSON.parse(localStorage.getItem('users')) || [];

            // Search for the user with entered credentials
            const user = users.find(u => u.phone === phone && u.password === password);

            if (user) {
                alert('Welcome ' + user.username + '!\nLogin successful!');
                
                // Save current user data
                localStorage.setItem('currentUser', JSON.stringify(user));
                
                // Navigate to games area
                window.location.href = '../games_area/main_menu.html';
            } else {
                alert('Incorrect phone number or password!');
            }
        });
    </script>
</body>
</html>
