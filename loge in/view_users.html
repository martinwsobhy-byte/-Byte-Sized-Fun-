<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users List</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            direction: ltr;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        tr:hover {
            background: #f5f5f5;
        }

        .btn-container {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s;
        }

        .btn-clear {
            background: #e74c3c;
            color: white;
        }

        .btn-back {
            background: #667eea;
            color: white;
        }

        button:hover {
            transform: translateY(-2px);
        }
        .no-users {
            text-align: center;
            color: #666;
            padding: 40px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Registered Users List</h1>
        <div id="usersTable"></div>
        <div class="btn-container">
            <button class="btn-back" onclick="window.location.href='../index.html'">Back to Login</button>
            <button class="btn-clear" onclick="clearAllUsers()">Delete All Users</button>
        </div>
    </div>

    <script>
        function displayUsers() {
            const users = JSON.parse(localStorage.getItem('users')) || [];
            const container = document.getElementById('usersTable');

            if (users.length === 0) {
                container.innerHTML = '<div class="no-users">No registered users found</div>';
                return;
            }
            let html = '<table><thead><tr><th>#</th><th>Name</th><th>Phone Number</th><th>Password</th></tr></thead><tbody>';
            
            users.forEach((user, index) => {
                html += `<tr>
                    <td>${index + 1}</td>
                    <td>${user.username}</td>
                    <td>${user.phone}</td>
                    <td>${user.password}</td>
                </tr>`;
            });
            html += '</tbody></table>';
            container.innerHTML = html;
        }
        function clearAllUsers() {
            if (confirm('Are you sure you want to delete all users?')) {
                // Clear all users
                localStorage.removeItem('users');
                localStorage.removeItem('currentUser');
                
                alert('All users have been deleted!');
                displayUsers();
            }
        }
        displayUsers();
    </script>
</body>
</html>
